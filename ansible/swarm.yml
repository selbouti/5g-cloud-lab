- name: Init Swarm manager
  hosts: core5g
  become: true

  tasks:
    - name: Check swarm state
      shell: docker info -f '{{ "{{.Swarm.LocalNodeState}}" }}'
      register: swarm_state
      ignore_errors: yes

    - name: Init swarm
      shell: docker swarm init --advertise-addr {{ ansible_host }}
      when: swarm_state.stdout != "active"
      ignore_errors: yes

    - name: Get worker token
      shell: docker swarm join-token worker -q
      register: token

    - name: Save token locally
      copy:
        content: "{{ token.stdout }}"
        dest: /tmp/swarm_token.txt
      delegate_to: localhost

- name: Join workers
  hosts: kamailio:srsran
  become: true

  tasks:
    - name: Read token
      slurp:
        src: /tmp/swarm_token.txt
      register: token_file
      delegate_to: localhost

    - name: Join swarm
      shell: docker swarm join --token {{ token_file.content | b64decode | trim }} 10.0.2.10:2377
      ignore_errors: yes
