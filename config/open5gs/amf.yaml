logger:
  file: /var/log/open5gs/amf.log

global:
  max:
    ue: 1024

amf:
  sbi:
    server:
      - address: 10.0.4.2
        port: 7777
    client:
      nrf:
        - uri: http://10.0.4.2:7777

  ngap:
    server:
      - address: 10.0.6.2

  metrics:
    server:
      - address: 10.0.4.2
        port: 9090

  guami:
    - plmn_id:
        mcc: 999
        mnc: 70
      amf_id:
        region: 2
        set: 1

  tai:
    - plmn_id:
        mcc: 999
        mnc: 70
      tac: 7

  plmn_support:
    - plmn_id:
        mcc: 999
        mnc: 70
      s_nssai:
        - sst: 1

  security:
    integrity_order:
      - NIA2
      - NIA1
      - NIA0
    ciphering_order:
      - NEA2
      - NEA1
      - NEA0

  network_name:
    full: Open5GS
    short: Open5GS

  amf_name: open5gs-amf0
